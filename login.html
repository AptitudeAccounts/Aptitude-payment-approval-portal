<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-bg-shape one"></div>
  <div class="login-bg-shape two"></div>

  <div class="glass-card">
    <div class="login-logo-wrap">
      <div class="brand-mark">A</div>
      <h1>Aptitude Payment Approval Portal</h1>
      <p>Secure corporate payment workflow management</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" novalidate>
      <div class="glass-input-group">
        <label for="loginEmail">Email Address</label>
        <div class="input-icon-wrap">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" class="glass-input" id="loginEmail" placeholder="name@aptitude.ae" required>
        </div>
      </div>

      <div class="glass-input-group">
        <label for="loginPassword">Password</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="glass-input" id="loginPassword" placeholder="Enter your password" required>
          <button type="button" class="toggle-pass" id="togglePassword"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <div class="login-options">
        <label class="d-flex align-items-center gap-2 mb-0">
          <input type="checkbox" id="rememberMe" class="form-check-input mt-0"> Remember Me
        </label>
        <a href="#" id="forgotPasswordLink">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-gold" id="loginSubmitBtn">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Login
      </button>
    </form>

    <div class="login-demo-hint">
      <b>Demo accounts</b> (create these in Firebase Authentication first — see README):<br>
      Accounts&nbsp;Team: accounts@aptitude.ae &nbsp;|&nbsp; Admin: admin@aptitude.ae &nbsp;|&nbsp; Operations: operations@aptitude.ae
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
