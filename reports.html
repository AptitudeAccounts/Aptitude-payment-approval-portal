<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports & Analytics | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content">

      <div class="content-card mb-3">
        <div class="row g-3 align-items-end">
          <div class="col-md-2">
            <label class="form-label">Period</label>
            <select class="form-select" id="filterPeriod">
              <option value="all">All Time</option>
              <option value="daily">Today</option>
              <option value="weekly">This Week</option>
              <option value="monthly" selected>This Month</option>
              <option value="quarterly">This Quarter</option>
              <option value="yearly">This Year</option>
              <option value="custom">Custom Range</option>
            </select>
          </div>
          <div class="col-md-2 d-none" id="customFromWrap">
            <label class="form-label">From</label>
            <input type="date" class="form-control" id="customFrom">
          </div>
          <div class="col-md-2 d-none" id="customToWrap">
            <label class="form-label">To</label>
            <input type="date" class="form-control" id="customTo">
          </div>
          <div class="col-md-2">
            <label class="form-label">Status</label>
            <select class="form-select" id="filterStatus">
              <option value="">All</option>
              <option>Draft</option>
              <option>Pending Approval</option>
              <option>Approved</option>
              <option>Rejected</option>
              <option>On Hold</option>
              <option>Paid</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Outlet</label>
            <select class="form-select" id="filterOutlet">
              <option value="">All Outlets</option>
              <option>Louvre</option>
              <option>ARC</option>
              <option>S45 Khalidya</option>
              <option>DGE</option>
              <option>Al Qana</option>
              <option>Al Nahyan</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Search Supplier</label>
            <input type="text" class="form-control" id="filterSupplier" placeholder="Supplier name">
          </div>
          <div class="col-md-2">
            <button class="btn btn-navy w-100" id="applyReportFilterBtn"><i class="fa-solid fa-filter me-1"></i>Apply</button>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3" id="reportKpiRow"></div>

      <div class="row g-3 mb-3">
        <div class="col-lg-6">
          <div class="content-card h-100">
            <h5 class="mb-3"><i class="fa-solid fa-chart-column me-2 text-muted-soft"></i>Monthly Payments</h5>
            <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="content-card h-100">
            <h5 class="mb-3"><i class="fa-solid fa-store me-2 text-muted-soft"></i>Outlet Analysis</h5>
            <div class="chart-wrap"><canvas id="outletChart"></canvas></div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-lg-4">
          <div class="content-card h-100">
            <h5 class="mb-3"><i class="fa-solid fa-tags me-2 text-muted-soft"></i>Category Analysis</h5>
            <div class="chart-wrap" style="height:230px"><canvas id="categoryChart"></canvas></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="content-card h-100">
            <h5 class="mb-3"><i class="fa-solid fa-list-check me-2 text-muted-soft"></i>Status Analysis</h5>
            <div class="chart-wrap" style="height:230px"><canvas id="statusAnalysisChart"></canvas></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="content-card h-100">
            <h5 class="mb-3"><i class="fa-solid fa-arrow-trend-up me-2 text-muted-soft"></i>Payment Trend</h5>
            <div class="chart-wrap" style="height:230px"><canvas id="trendReportChart"></canvas></div>
          </div>
        </div>
      </div>

      <div class="content-card">
        <div class="card-header-row">
          <h5><i class="fa-solid fa-ranking-star me-2 text-muted-soft"></i>Top Suppliers</h5>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-navy" id="exportReportPdfBtn"><i class="fa-regular fa-file-pdf me-1"></i>PDF</button>
            <button class="btn btn-sm btn-outline-navy" id="exportReportExcelBtn"><i class="fa-regular fa-file-excel me-1"></i>Excel</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr><th>#</th><th>Supplier</th><th>Total Requests</th><th>Pending</th><th>Total Paid</th><th>Avg Payment</th><th>Last Payment</th><th></th></tr>
            </thead>
            <tbody id="topSuppliersBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Supplier Profile Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-xl">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="supplierModalName">Supplier Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3" id="supplierKpiRow"></div>
        <div class="chart-wrap mb-3" style="height:220px"><canvas id="supplierMonthlyChart"></canvas></div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead><tr><th>Payment ID</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
            <tbody id="supplierHistoryBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pdf-export.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
