<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Details | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content" id="pageContentRoot">
      <div class="d-flex justify-content-between align-items-center mb-3 no-print">
        <a href="history.html" class="btn btn-outline-navy btn-sm"><i class="fa-solid fa-arrow-left me-1"></i>Back</a>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-navy btn-sm" id="printBtn"><i class="fa-solid fa-print me-1"></i>Print</button>
          <button class="btn btn-navy btn-sm" id="downloadPdfBtn"><i class="fa-regular fa-file-pdf me-1"></i>Download PDF</button>
        </div>
      </div>

      <div id="detailsLoading">
        <div class="skeleton skeleton-card mb-3"></div>
        <div class="skeleton skeleton-card"></div>
      </div>

      <div id="detailsContent" class="d-none">
        <div class="content-card mb-3">
          <div class="d-flex justify-content-between flex-wrap gap-2 mb-3">
            <div>
              <h4 class="mb-1" id="dPaymentId"></h4>
              <p class="text-muted-soft mb-0" id="dSupplier"></p>
            </div>
            <div class="text-end">
              <div id="dStatus" class="mb-2"></div>
              <div id="dPriority"></div>
            </div>
          </div>
          <hr>
          <div class="row g-3">
            <div class="col-md-3"><small class="text-muted-soft d-block">Amount</small><b id="dAmount"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Outlet</small><b id="dOutlet"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Payment Type</small><b id="dPaymentType"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Category</small><b id="dCategory"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Invoice Number</small><b id="dInvoiceNumber"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Invoice Date</small><b id="dInvoiceDate"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Required Payment Date</small><b id="dRequiredDate"></b></div>
            <div class="col-md-3"><small class="text-muted-soft d-block">Requested By</small><b id="dRequestedBy"></b></div>
            <div class="col-md-6"><small class="text-muted-soft d-block">Purpose of Payment</small><b id="dPurpose"></b></div>
            <div class="col-md-6"><small class="text-muted-soft d-block">Supplier Code</small><b id="dSupplierCode"></b></div>
            <div class="col-12"><small class="text-muted-soft d-block">Description</small><span id="dDescription"></span></div>
            <div class="col-12"><small class="text-muted-soft d-block">Remarks</small><span id="dRemarks"></span></div>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-lg-7">
            <div class="content-card mb-3">
              <h5 class="mb-3"><i class="fa-solid fa-timeline me-2 text-muted-soft"></i>Approval Timeline</h5>
              <div class="timeline" id="approvalTimeline"></div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="content-card">
              <h5 class="mb-3"><i class="fa-solid fa-paperclip me-2 text-muted-soft"></i>Attachments</h5>
              <div id="attachmentsList"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pdf-export.js"></script>
<script src="js/payment-details.js"></script>
</body>
</html>
