<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="content-card text-center">
            <div class="avatar-lg mx-auto mb-3" id="profileAvatar"></div>
            <h5 class="mb-1" id="profileName"></h5>
            <p class="text-muted-soft mb-1" id="profileRole"></p>
            <p class="text-muted-soft small" id="profileEmail"></p>
            <button class="btn btn-outline-secondary w-100 mt-2" id="logoutProfileBtn"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i>Logout</button>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="content-card">
            <h5 class="mb-3">Change Password</h5>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" minlength="6">
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" minlength="6">
              </div>
            </div>
            <div class="invalid-feedback d-block d-none" id="passwordError"></div>
            <button class="btn btn-navy mt-3" id="changePasswordBtn"><i class="fa-solid fa-key me-1"></i>Update Password</button>
            <p class="small text-muted-soft mt-3 mb-0">
              <i class="fa-solid fa-circle-info me-1"></i>
              For security, changing your password may require you to have signed in recently. If it fails,
              log out and log back in, then try again.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
