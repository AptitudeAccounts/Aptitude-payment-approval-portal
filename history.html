<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment History | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content">

      <div class="content-card mb-3">
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Search</label>
            <input type="text" class="form-control" id="filterSearch" placeholder="Payment ID, supplier, invoice...">
          </div>
          <div class="col-md-2">
            <label class="form-label">Status</label>
            <select class="form-select" id="filterStatus">
              <option value="">All</option>
              <option>Draft</option>
              <option>Pending Approval</option>
              <option>Approved</option>
              <option>Rejected</option>
              <option>On Hold</option>
              <option>Paid</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Outlet</label>
            <select class="form-select" id="filterOutlet">
              <option value="">All Outlets</option>
              <option>Louvre</option>
              <option>ARC</option>
              <option>S45 Khalidya</option>
              <option>DGE</option>
              <option>Al Qana</option>
              <option>Al Nahyan</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Category</label>
            <select class="form-select" id="filterCategory">
              <option value="">All Categories</option>
              <option>Expense</option>
              <option>Inventory</option>
              <option>Utility</option>
              <option>Salary</option>
              <option>Maintenance</option>
              <option>Tax</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-navy flex-fill" id="applyFilterBtn"><i class="fa-solid fa-filter me-1"></i>Apply Filters</button>
            <button class="btn btn-outline-secondary" id="resetFilterBtn"><i class="fa-solid fa-rotate-left"></i></button>
          </div>
        </div>
      </div>

      <div class="content-card">
        <div class="card-header-row">
          <h5 id="historyTitle"><i class="fa-solid fa-clock-rotate-left me-2 text-muted-soft"></i>Payment History</h5>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-navy" id="exportPdfBtn"><i class="fa-regular fa-file-pdf me-1"></i>PDF</button>
            <button class="btn btn-sm btn-outline-navy" id="exportExcelBtn"><i class="fa-regular fa-file-excel me-1"></i>Excel</button>
            <button class="btn btn-sm btn-outline-navy" id="exportCsvBtn"><i class="fa-solid fa-file-csv me-1"></i>CSV</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr>
                <th class="sortable" data-key="paymentId" style="cursor:pointer">Payment ID <i class="fa-solid fa-sort small"></i></th>
                <th class="sortable" data-key="supplierName" style="cursor:pointer">Supplier <i class="fa-solid fa-sort small"></i></th>
                <th>Outlet</th>
                <th class="sortable" data-key="amount" style="cursor:pointer">Amount <i class="fa-solid fa-sort small"></i></th>
                <th>Requested By</th>
                <th class="sortable" data-key="requiredPaymentDate" style="cursor:pointer">Payment Date <i class="fa-solid fa-sort small"></i></th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="historyTableBody">
              <tr><td colspan="8"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="8"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="8"><div class="skeleton skeleton-row"></div></td></tr>
            </tbody>
          </table>
          <div class="empty-state d-none" id="historyEmptyState">
            <i class="fa-regular fa-folder-open"></i>
            <p>No payment requests match your filters.</p>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <span class="small text-muted-soft" id="resultCount"></span>
          <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pdf-export.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/history.js"></script>
</body>
</html>
