<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approvals | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content">

      <ul class="nav nav-pills mb-3" id="statusTabs">
        <li class="nav-item"><a class="nav-link active" data-status="Pending Approval" href="#">Pending Approvals</a></li>
        <li class="nav-item"><a class="nav-link" data-status="On Hold" href="#">Held</a></li>
        <li class="nav-item"><a class="nav-link" data-status="Approved" href="#">Approved</a></li>
        <li class="nav-item"><a class="nav-link" data-status="Paid" href="#">Paid</a></li>
        <li class="nav-item"><a class="nav-link" data-status="Rejected" href="#">Rejected</a></li>
      </ul>

      <div class="content-card">
        <div class="card-header-row">
          <h5><i class="fa-solid fa-stamp me-2 text-muted-soft"></i><span id="tableTitle">Pending Approvals</span></h5>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-navy" id="exportPdfBtn"><i class="fa-regular fa-file-pdf me-1"></i>Export PDF</button>
            <button class="btn btn-sm btn-outline-navy" id="exportExcelBtn"><i class="fa-regular fa-file-excel me-1"></i>Export Excel</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr>
                <th>Payment ID</th>
                <th>Supplier</th>
                <th>Outlet</th>
                <th>Amount</th>
                <th>Requested By</th>
                <th>Payment Date</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="approvalTableBody">
              <tr><td colspan="9"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="9"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="9"><div class="skeleton skeleton-row"></div></td></tr>
            </tbody>
          </table>
          <div class="empty-state d-none" id="approvalEmptyState">
            <i class="fa-regular fa-circle-check"></i>
            <p>Nothing here right now.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Approve / Reject / Hold / Mark Paid Modal -->
<div class="modal fade" id="actionModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-xl">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="actionModalTitle">Approve Payment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted-soft small mb-3">Payment ID: <b class="mono-id" id="actionModalPaymentId"></b></p>
        <label class="form-label" id="actionModalLabel">Remarks <span class="text-danger">*</span></label>
        <textarea class="form-control" id="actionRemarks" rows="4" placeholder="Enter your remarks..."></textarea>
        <div class="invalid-feedback d-block d-none" id="actionRemarksError">Remarks are required.</div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn" id="actionConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
<script src="js/pdf-export.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/approval.js"></script>
</body>
</html>
