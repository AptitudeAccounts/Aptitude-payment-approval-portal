<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers | Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="shellSidebarSlot"></div>
  <div class="main-wrap">
    <div id="shellTopbarSlot"></div>

    <div class="page-content">

      <div class="content-card mb-3">
        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <label class="form-label">Search Suppliers</label>
            <div class="input-icon-wrap" style="position:relative;">
              <input type="text" class="form-control" id="supplierSearchInput" placeholder="Start typing a supplier name..." autocomplete="off">
            </div>
          </div>
          <div class="col-md-4 text-md-end">
            <span class="text-muted-soft small" id="supplierCountLabel"></span>
          </div>
        </div>
      </div>

      <div class="content-card">
        <div class="card-header-row">
          <h5><i class="fa-solid fa-building me-2 text-muted-soft"></i>Supplier Directory</h5>
        </div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr>
                <th>Supplier Name</th>
                <th>Supplier Code</th>
                <th>Contact</th>
                <th>Last Updated</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="suppliersTableBody">
              <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
              <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
            </tbody>
          </table>
          <div class="empty-state d-none" id="suppliersEmptyState">
            <i class="fa-regular fa-building"></i>
            <p>No suppliers found. Try a different search, or add one from a payment request.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Supplier Payment History Modal -->
<div class="modal fade" id="supplierHistoryModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-xl">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="supplierHistoryModalName">Supplier Payment History</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3" id="supplierHistoryKpiRow"></div>
        <div class="chart-wrap mb-3" style="height:220px"><canvas id="supplierHistoryChart"></canvas></div>
        <div class="table-responsive">
          <table class="table-modern">
            <thead><tr><th>Payment ID</th><th>Outlet</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
            <tbody id="supplierHistoryTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/suppliers.js"></script>
</body>
</html>
