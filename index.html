<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aptitude Payment Approval Portal</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#08132A,#0B1E3D 45%,#122A54 100%);
    font-family:sans-serif;color:#fff;}
  .ring{width:52px;height:52px;border-radius:50%;border:4px solid rgba(255,255,255,.2);
    border-top-color:#C9A24B;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div style="text-align:center;">
    <div class="ring"></div>
    <div>Loading Aptitude Payment Approval Portal...</div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase/firebase-config.js"></script>
<script>
  auth.onAuthStateChanged((user) => {
    if (user && getRoleForEmail(user.email)) {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "login.html";
    }
  });
  // Fallback in case Firebase config placeholders are not yet filled in
  setTimeout(() => {
    if (document.body) window.location.href = "login.html";
  }, 3500);
</script>
</body>
</html>
